<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fernando Delgado Izquierdo | Formación y Experiencia</title>
  <meta name="description" content="Línea de tiempo: formación y experiencia profesional de Fernando Delgado Izquierdo.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .timeline-container {
      padding: 60px 0;
    }

    .timeline-svg {
      width: 100%;
      min-height: 600px;
      display: block;
    }

    .tooltip {
      position: fixed;
      background: var(--surface-strong);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.85rem;
      z-index: 1000;
      display: none;
      pointer-events: none;
      box-shadow: var(--shadow);
      max-width: 220px;
    }

    .tooltip.visible {
      display: block;
    }

    .tooltip-badge {
      font-size: 0.65rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
      padding: 3px 8px;
      border-radius: 3px;
      display: inline-block;
    }

    .tooltip-badge.formacion {
      background: rgba(155, 167, 255, 0.2);
      color: #c4cbff;
    }

    .tooltip-badge.experiencia {
      background: rgba(56, 169, 214, 0.2);
      color: #38a9d6;
    }

    .tooltip-title {
      font-weight: 600;
      color: var(--text);
      margin: 4px 0;
    }

    .tooltip-org {
      color: var(--muted);
      font-size: 0.8rem;
      margin: 2px 0;
    }

    .tooltip-desc {
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.4;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="index.html">
        <span class="brand-mark">FD</span>
        <span>Fernando Delgado Izquierdo</span>
      </a>
      <nav class="main-nav">
        <a href="index.html">Inicio</a>
        <a href="desarrollo.html">Desarrollo</a>
        <a href="administracion.html">Administración</a>
        <a href="socorrismo.html">Socorrismo y monitor</a>
        <a class="active" href="trayectoria.html">Formación y Experiencia</a>
        <a href="contacto.html">Contacto</a>
      </nav>
    </header>

    <main>
      <section class="page-hero">
        <p class="eyebrow">Formación y experiencia</p>
        <h1>Mi trayectoria</h1>
        <p class="lead">
          Formación y experiencia profesional desde 2022, mostrando cómo la educación y el trabajo se entrelazan en mi desarrollo.
        </p>
      </section>

      <section class="section">
        <div class="timeline-container">
          <svg class="timeline-svg" id="timeline"></svg>
          <div class="tooltip" id="tooltip">
            <div class="tooltip-badge" id="tooltip-badge"></div>
            <div class="tooltip-title" id="tooltip-title"></div>
            <div class="tooltip-org" id="tooltip-org"></div>
            <div class="tooltip-desc" id="tooltip-desc"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const events = [
      { start: "2022-09", end: "2024-06", type: "formacion", title: "Grado Medio Gestión Administrativa", org: "IES Pedro Mercedes", desc: "Formación reglada en procesos administrativos" },
      { start: "2023-04", end: "2023-07", type: "formacion", title: "Desarrollo videojuegos", org: "Iworking", desc: "Programación en C#, modelado 3D y Unity" },
      { start: "2023-07", end: "2023-08", type: "experiencia", title: "Prácticas VR", org: "Iworking", desc: "Apoyo técnico en desarrollo de realidad virtual" },
      { start: "2024-04", end: "2024-06", type: "experiencia", title: "Prácticas administrativas", org: "MRW", desc: "Atención, oficina, rutas y herramientas digitales" },
      { start: "2024-04", end: "2024-06", type: "formacion", title: "Dinamización tiempo libre", org: "Iworking", desc: "Procesos grupales y organización de actividades" },
      { start: "2024-06", end: "2024-07", type: "experiencia", title: "Prácticas de monitor", org: "Centro Ortega y Gasset", desc: "Supervisión, seguridad y dinamización" },
      { start: "2024-09", end: "2026-03", type: "formacion", title: "Administración y Finanzas", org: "IES Pedro Mercedes", desc: "Grado superior en gestión empresarial" },
      { start: "2024-10", end: "2024-11", type: "formacion", title: "Análisis Power BI", org: "Formación", desc: "Análisis de datos y visualización" },
      { start: "2024-11", end: "2024-11", type: "formacion", title: "Socorrista acuático", org: "Global Encesap", desc: "Rescate, salvamento y protocolos de seguridad" },
      { start: "2025-02", end: "2026-06", type: "experiencia", title: "Monitor VR y desarrollador", org: "Virtual Cuenca", desc: "Monitor de VR y desarrollo del juego" },
      { start: "2025-06", end: "2025-09", type: "experiencia", title: "Socorrista acuático", org: "Clima Cuenca SLU", desc: "Vigilancia, atención y control de material" },
      { start: "2026-04", end: "2026-06", type: "experiencia", title: "Prácticas administrativas", org: "Obrescam", desc: "Gestión y seguimiento documental" },
      { start: "2026-06", end: "2026-12", type: "experiencia", title: "Trabajador administrativo", org: "Obrescam", desc: "Administrativo contratado" },
      { start: "2026-06", end: "2026-12", type: "experiencia", title: "Socorrista acuático", org: "Clima Cuenca SLU", desc: "Socorrista activo" }
    ];

    function dateToMonths(dateStr) {
      const [year, month] = dateStr.split("-").map(Number);
      return year * 12 + month;
    }

    const minMonth = Math.min(...events.map(e => dateToMonths(e.start)));
    const maxMonth = Math.max(...events.map(e => dateToMonths(e.end)));
    const timelineRange = maxMonth - minMonth + 1;

    function getMonthPos(dateStr) {
      return dateToMonths(dateStr) - minMonth;
    }

    // Calcular filas por solapamiento
    function assignRows(events) {
      const rows = [];
      events.forEach(event => {
        const eventStart = getMonthPos(event.start);
        const eventEnd = getMonthPos(event.end);

        let placed = false;
        for (let row of rows) {
          let canPlace = true;
          for (let existing of row) {
            const existStart = getMonthPos(existing.start);
            const existEnd = getMonthPos(existing.end);
            if (!(eventEnd < existStart || eventStart > existEnd)) {
              canPlace = false;
              break;
            }
          }
          if (canPlace) {
            row.push(event);
            placed = true;
            break;
          }
        }
        if (!placed) {
          rows.push([event]);
        }
      });
      return rows;
    }

    const rows = assignRows(events);
    const svg = document.getElementById("timeline");
    const rowHeight = 70;
    const barHeight = 8;
    const markerHeight = 20;
    const padding = 80;
    const svgWidth = window.innerWidth > 1024 ? 1200 : window.innerWidth - 40;

    const totalHeight = padding * 2 + rows.length * rowHeight;
    svg.setAttribute("viewBox", `0 0 ${svgWidth} ${totalHeight}`);
    svg.setAttribute("preserveAspectRatio", "xMidYMid meet");

    const contentWidth = svgWidth - 160;
    const connectorSegments = [];

    // Dibujar barras
    rows.forEach((row, rowIdx) => {
      const yCenter = padding + rowIdx * rowHeight;
      const direction = rowIdx % 2 === 0 ? 1 : -1;

      row.forEach((event, eventIdx) => {
        const startPos = getMonthPos(event.start);
        const endPos = getMonthPos(event.end);
        const duration = endPos - startPos + 1;

        let x1, x2;
        if (direction === 1) {
          x1 = 80 + (startPos / timelineRange) * contentWidth;
          x2 = 80 + ((startPos + duration) / timelineRange) * contentWidth;
        } else {
          x1 = 80 + ((timelineRange - startPos - duration) / timelineRange) * contentWidth;
          x2 = 80 + ((timelineRange - startPos) / timelineRange) * contentWidth;
        }

        const color = event.type === "formacion" ? "#9ba7ff" : "#3885d6";

        // Barra horizontal
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", x1);
        line.setAttribute("y1", yCenter);
        line.setAttribute("x2", x2);
        line.setAttribute("y2", yCenter);
        line.setAttribute("stroke", color);
        line.setAttribute("stroke-width", "8");
        line.setAttribute("stroke-linecap", "round");
        svg.appendChild(line);

        // Marcador inicio
        const m1 = document.createElementNS("http://www.w3.org/2000/svg", "line");
        m1.setAttribute("x1", x1);
        m1.setAttribute("y1", yCenter - markerHeight / 2);
        m1.setAttribute("x2", x1);
        m1.setAttribute("y2", yCenter + markerHeight / 2);
        m1.setAttribute("stroke", color);
        m1.setAttribute("stroke-width", "2");
        m1.setAttribute("stroke-linecap", "round");
        svg.appendChild(m1);

        // Marcador fin
        const m2 = document.createElementNS("http://www.w3.org/2000/svg", "line");
        m2.setAttribute("x1", x2);
        m2.setAttribute("y1", yCenter - markerHeight / 2);
        m2.setAttribute("x2", x2);
        m2.setAttribute("y2", yCenter + markerHeight / 2);
        m2.setAttribute("stroke", color);
        m2.setAttribute("stroke-width", "2");
        m2.setAttribute("stroke-linecap", "round");
        svg.appendChild(m2);

        // Etiqueta
        const textY = direction === 1 ? yCenter - 18 : yCenter + 18;
        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        text.setAttribute("x", (x1 + x2) / 2);
        text.setAttribute("y", textY);
        text.setAttribute("text-anchor", "middle");
        text.setAttribute("font-size", "0.75rem");
        text.setAttribute("font-weight", "500");
        text.setAttribute("fill", color);
        text.setAttribute("pointer-events", "none");
        text.textContent = event.title;
        svg.appendChild(text);

        // Área interactiva
        const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        rect.setAttribute("x", Math.min(x1, x2) - 5);
        rect.setAttribute("y", yCenter - markerHeight);
        rect.setAttribute("width", Math.abs(x2 - x1) + 10);
        rect.setAttribute("height", markerHeight * 2);
        rect.setAttribute("fill", "transparent");
        rect.setAttribute("cursor", "pointer");

        rect.addEventListener("mouseenter", (e) => {
          const tooltip = document.getElementById("tooltip");
          document.getElementById("tooltip-badge").textContent = event.type === "formacion" ? "Formación" : "Experiencia";
          document.getElementById("tooltip-badge").className = `tooltip-badge ${event.type}`;
          document.getElementById("tooltip-title").textContent = event.title;
          document.getElementById("tooltip-org").textContent = event.org;
          document.getElementById("tooltip-desc").textContent = event.desc;
          tooltip.classList.add("visible");
          tooltip.style.left = (e.clientX + 10) + "px";
          tooltip.style.top = (e.clientY + 10) + "px";
        });

        rect.addEventListener("mousemove", (e) => {
          const tooltip = document.getElementById("tooltip");
          tooltip.style.left = (e.clientX + 10) + "px";
          tooltip.style.top = (e.clientY + 10) + "px";
        });

        rect.addEventListener("mouseleave", () => {
          document.getElementById("tooltip").classList.remove("visible");
        });

        svg.appendChild(rect);

        // Guardar para conectores
        connectorSegments.push({ x: x2, y: yCenter, rowIdx, color });
      });
    });

    // Dibujar conectores rojos entre filas
    for (let i = 0; i < connectorSegments.length - 1; i++) {
      const current = connectorSegments[i];
      const next = connectorSegments[i + 1];

      if (current.rowIdx !== next.rowIdx) {
        const connector = document.createElementNS("http://www.w3.org/2000/svg", "line");
        connector.setAttribute("x1", current.x);
        connector.setAttribute("y1", current.y);
        connector.setAttribute("x2", next.x);
        connector.setAttribute("y2", next.y);
        connector.setAttribute("stroke", "#ff5a7e");
        connector.setAttribute("stroke-width", "2");
        connector.setAttribute("stroke-linecap", "round");
        svg.insertBefore(connector, svg.firstChild);
      }
    }
  </script>
</body>
</html>
